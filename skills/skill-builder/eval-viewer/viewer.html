<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eval Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; line-height: 1.5; }

:focus-visible { outline: 2px solid #0066cc; outline-offset: 2px; border-radius: 2px; }

.tablist { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
.tab { padding: 12px 24px; cursor: pointer; border: none; background: none; font-size: 14px; font-weight: 500; color: #666; border-bottom: 2px solid transparent; }
.tab[aria-selected="true"] { color: #1a1a1a; border-bottom-color: #0066cc; }
[role="tabpanel"] { display: none; padding: 20px; max-width: 960px; margin: 0 auto; }
[role="tabpanel"][aria-hidden="false"] { display: block; }
.run-header { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.run-header h2 { font-size: 16px; margin-bottom: 8px; }
.prompt { background: #f0f5ff; border-radius: 4px; padding: 12px; font-size: 13px; white-space: pre-wrap; margin-bottom: 12px; }
.output-files { display: grid; gap: 12px; }
.output-file { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 12px; min-width: 0; }
.output-file h3 { font-size: 13px; color: #0066cc; margin-bottom: 8px; }
.output-file pre { background: #fafafa; border: 1px solid #eee; border-radius: 4px; padding: 12px; font-size: 12px; overflow-x: auto; max-height: 400px; max-width: 100%; }
.output-file img { max-width: 100%; border: 1px solid #eee; border-radius: 4px; }
.nav-buttons { display: flex; gap: 8px; margin: 16px 0; }
.nav-buttons button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
.nav-buttons button:hover { background: #f0f0f0; }
.nav-buttons button:disabled { opacity: 0.5; cursor: default; }
.eval-counter { font-size: 13px; color: #555; padding: 8px 0; }
.grading { margin-top: 12px; }
.grading h3 { font-size: 13px; margin-bottom: 8px; }
.assertion { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 8px; padding: 6px 0; font-size: 13px; }
.assertion .result { font-weight: 600; min-width: 40px; }
.assertion.pass .result { color: #1a7f37; }
.assertion.fail .result { color: #cf222e; }
.assertion .evidence { color: #555; font-size: 12px; flex: 0 0 100%; padding-left: 48px; }
.grading-summary { font-size: 12px; color: #555; margin-bottom: 8px; }
.feedback-box { margin-top: 12px; }
.feedback-box label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 4px; }
.feedback-box textarea { width: 100%; min-height: 80px; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 13px; resize: vertical; }
.feedback-box textarea:focus { border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.3); }
.summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
.stat-card h3 { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 600; }
.stat-card .value.positive { color: #1a7f37; }
.stat-card .value.negative { color: #cf222e; }
.stat-card .sub { font-size: 12px; color: #555; margin-top: 2px; }
table.benchmark-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
table.benchmark-table th, table.benchmark-table td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #eee; }
table.benchmark-table th { background: #fafafa; font-weight: 600; color: #444; }
.config-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.config-badge.with_skill { background: #ddf4ff; color: #0066cc; }
.config-badge.without_skill { background: #f0f0f0; color: #555; }
.config-badge.baseline { background: #f0f0f0; color: #555; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
.glossary-term { font-weight: 600; font-size: 14px; color: #1a1a1a; margin-top: 16px; margin-bottom: 4px; }
.glossary-def { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 8px; padding-left: 12px; border-left: 2px solid #0066cc; }
</style>
</head>
<body>
<header>
  <nav aria-label="Tabs" role="tablist" class="tablist">
    <button role="tab" aria-selected="true" aria-controls="tabpanel-outputs" id="tab-btn-outputs" class="tab">Outputs</button>
    <button role="tab" aria-selected="false" aria-controls="tabpanel-benchmark" id="tab-btn-benchmark" class="tab">Benchmark</button>
    <button role="tab" aria-selected="false" aria-controls="tabpanel-glossary" id="tab-btn-glossary" class="tab">Glossary</button>
  </nav>
</header>

<main>
  <h1 class="sr-only" id="page-title">Eval Viewer</h1>

  <section role="tabpanel" id="tabpanel-outputs" aria-labelledby="tab-btn-outputs" aria-hidden="false">
    <nav aria-label="Run navigation">
      <div class="nav-buttons">
        <button id="prev-btn" disabled>&larr; Previous</button>
        <button id="next-btn">Next &rarr;</button>
      </div>
    </nav>
    <div aria-live="polite" aria-atomic="true">
      <div class="eval-counter" id="eval-counter"></div>
      <div id="run-display"></div>
    </div>
  </section>

  <section role="tabpanel" id="tabpanel-benchmark" aria-labelledby="tab-btn-benchmark" aria-hidden="true">
    <div id="benchmark-display"></div>
  </section>

  <section role="tabpanel" id="tabpanel-glossary" aria-labelledby="tab-btn-glossary" aria-hidden="true">
    <div id="glossary-display"></div>
  </section>
</main>

<script>
/*__EMBEDDED_DATA__*/

const state = { currentIndex: 0, feedback: {} };
const runs = EMBEDDED_DATA.runs || [];
const benchmark = EMBEDDED_DATA.benchmark || null;
const previousFeedback = EMBEDDED_DATA.previous_feedback || {};
const previousOutputs = EMBEDDED_DATA.previous_outputs || {};

function renderRun(index) {
  if (!runs.length) { document.getElementById('run-display').innerHTML = '<p>No runs found.</p>'; return; }
  const run = runs[index];
  const total = runs.length;
  document.getElementById('eval-counter').textContent = `Run ${index + 1} of ${total}`;
  document.getElementById('prev-btn').disabled = index === 0;
  document.getElementById('next-btn').disabled = index === total - 1;

  let gradingHtml = '';
  if (run.grading && run.grading.expectations) {
    gradingHtml = '<div class="grading"><h3>Assertions</h3>';
    const summary = run.grading.summary || {};
    const pending = summary.pending || 0;
    const gradedTotal = (summary.passed || 0) + (summary.failed || 0);
    gradingHtml += `<div class="grading-summary">${summary.passed || 0} / ${summary.total || 0} passed`;
    if (pending > 0) gradingHtml += ` (${pending} pending)`;
    gradingHtml += `</div>`;
    run.grading.expectations.forEach(exp => {
      let cls, label;
      if (exp.passed === true) { cls = 'pass'; label = 'PASS'; }
      else if (exp.passed === false) { cls = 'fail'; label = 'FAIL'; }
      else { cls = 'pending'; label = 'PEND'; }
      gradingHtml += `<div class="assertion ${cls}"><span class="result">${label}</span><span>${exp.text}</span>`;
      if (exp.evidence) gradingHtml += `<div class="evidence">${exp.evidence}</div>`;
      gradingHtml += `</div>`;
    });
    gradingHtml += '</div>';
  }

  let outputsHtml = '';
  if (run.outputs && run.outputs.length) {
    outputsHtml = '<div class="output-files">';
    run.outputs.forEach(f => {
      outputsHtml += `<div class="output-file"><h3>${f.name}</h3>`;
      if (f.type === 'text') outputsHtml += `<pre>${escapeHtml(f.content)}</pre>`;
      else if (f.type === 'image') outputsHtml += `<img src="${f.data_uri}" alt="${f.name}">`;
      else if (f.type === 'pdf') outputsHtml += `<embed src="${f.data_uri}" type="application/pdf" width="100%" height="500px" title="${escapeHtml(f.name)}">`;
      else outputsHtml += `<p><a href="${f.data_uri}" download="${f.name}">Download ${f.name}</a></p>`;
      outputsHtml += '</div>';
    });
    outputsHtml += '</div>';
  }

  const fbKey = run.id;
  const savedFeedback = state.feedback[fbKey] || '';

  state.currentIndex = index;
  document.getElementById('run-display').innerHTML = `
    <div class="run-header">
      <h2 id="run-heading-${index}" tabindex="-1">${escapeHtml(run.eval_id || 'Run')}</h2>
      <div class="prompt">${escapeHtml(run.prompt)}</div>
      ${outputsHtml}
      ${gradingHtml}
      <div class="feedback-box">
        <label for="feedback-${index}">Feedback</label>
        <textarea id="feedback-${index}" onchange="saveFeedback('${fbKey}', this.value)">${escapeHtml(savedFeedback)}</textarea>
      </div>
    </div>
  `;
  document.getElementById(`run-heading-${index}`).focus();
}

function saveFeedback(runId, value) {
  state.feedback[runId] = value;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBenchmark() {
  const display = document.getElementById('benchmark-display');
  if (!benchmark) {
    display.innerHTML = '<p>No benchmark data available.</p>';
    return;
  }

  const summary = benchmark.config_stats || {};
  const delta = benchmark.delta || {};
  const configs = Object.keys(summary);

  let html = '<div class="summary-stats">';
  configs.forEach(config => {
    const data = summary[config] || {};
    const pr = data.pass_rate || {};
    const tm = data.time_seconds || {};
    const tok = data.tokens || {};
    html += `<div class="stat-card">
      <h3>${config.replace(/_/g, ' ')}</h3>
      <div class="value">${(pr.mean * 100).toFixed(0)}%</div>
      <div class="sub">pass rate &plusmn;${(pr.stddev * 100).toFixed(1)}%</div>
      <div class="sub">95% CI: ${(pr.ci_low * 100).toFixed(0)}%&ndash;${(pr.ci_high * 100).toFixed(0)}%</div>
      <div class="sub">${tm.mean.toFixed(1)}s &plusmn;${tm.stddev.toFixed(1)}s</div>
      <div class="sub">${tok.mean.toFixed(0)} chars &plusmn;${tok.stddev.toFixed(0)}</div>
    </div>`;
  });
  if (delta.pass_rate) {
    const isPos = delta.pass_rate.startsWith('+');
    html += `<div class="stat-card">
      <h3>Delta</h3>
      <div class="value ${isPos ? 'positive' : 'negative'}">${delta.pass_rate}</div>
      <div class="sub">pass rate</div>
      <div class="sub">${delta.time_seconds}s</div>
      <div class="sub">${delta.tokens} chars</div>
    </div>`;
  }
  html += '</div>';

  if (benchmark.runs && benchmark.runs.length) {
    html += '<table class="benchmark-table"><thead><tr><th>Eval</th><th>Config</th><th>Run</th><th>Pass Rate</th><th>Time</th><th>Output</th></tr></thead><tbody>';
    benchmark.runs.forEach(r => {
      const res = r.result || {};
      html += `<tr>
        <td>${escapeHtml(String(r.eval_id))}</td>
        <td><span class="config-badge ${r.configuration}">${r.configuration}</span></td>
        <td>${r.run_number}</td>
        <td>${(res.pass_rate * 100).toFixed(0)}%</td>
        <td>${res.time_seconds.toFixed(1)}s</td>
        <td>${res.tokens || '-'}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }

  display.innerHTML = html;
}

function renderGlossary() {
  const display = document.getElementById('glossary-display');
  display.innerHTML = `
    <h2 style="font-size:18px;margin-bottom:16px;">Evaluation Glossary</h2>
    <div class="glossary-term">Assertion</div>
    <div class="glossary-def">A single observable pass/fail check against an eval output. Each assertion tests one specific requirement — structural (e.g., file exists), mechanical (e.g., YAML parses), behavioral (e.g., workflow has validation step), or quality (e.g., description is activation-oriented). Assertions with deterministic checks are auto-resolved by script; subjective assertions require an LLM grader.</div>

    <div class="glossary-term">Deterministic Check</div>
    <div class="glossary-def">A script-based assertion that runs automatically using <code>check_assertions.py</code>. Types include <code>file_exists</code>, <code>yaml_field</code>, <code>yaml_valid</code>, <code>char_count</code>, <code>contains</code>, <code>not_contains</code>, <code>contains_regex</code>, and <code>not_empty</code>. Resolved before LLM grading — zero cost, no bias, instant.</div>

    <div class="glossary-term">Subjective Assertion</div>
    <div class="glossary-def">An assertion without executable checks, requiring an LLM grader to judge. Used for quality dimensions that cannot be mechanically verified — e.g., "the description is activation-oriented" or "the workflow covers edge cases." Subject to grader bias (position, verbosity, self-enhancement); mitigated via bias-awareness instructions in <code>agents/grader.md</code>.</div>

    <div class="glossary-term">Pass Rate</div>
    <div class="glossary-def">The proportion of assertions that passed in a run or configuration: <code>passed / total</code>. A value of 1.0 (100%) means every assertion passed. Pass rate is the primary quality metric — higher is better, but variance across runs matters too.</div>

    <div class="glossary-term">Wilson 95% Confidence Interval</div>
    <div class="glossary-def">The Wilson score interval for the true pass rate, computed across all assertions in a configuration. Unlike the normal approximation, it handles edge cases (0% or 100% pass rates) correctly. A wider CI means more uncertainty (fewer assertions or inconsistent results). Computed by <code>aggregate_benchmark.py</code> using the formula: <code>ci = (p + z²/2n ± z*sqrt(p(1-p)/n + z²/4n²)) / (1 + z²/n)</code> where z=1.96 for 95% confidence.</div>

    <div class="glossary-term">Output Size</div>
    <div class="glossary-def">Total characters across all generated output files in a run. Measured by <code>check_assertions.py</code> via <code>count_output_chars()</code>, which sums <code>len(read_bytes())</code> for every file in the outputs directory. A rough proxy for output volume — larger outputs cost more tokens but may also indicate more thorough work. Use in conjunction with pass rate: high quality + small output is ideal.</div>

    <div class="glossary-term">Standard Deviation</div>
    <div class="glossary-def">Measures variability across multiple runs in the same configuration. A small stddev relative to the mean indicates consistent performance. A large stddev suggests the skill or agent behaves unpredictably — investigate specific eval cases for root cause.</div>

    <div class="glossary-term">Configuration</div>
    <div class="glossary-def">The environment or skill setting for a group of runs. Common configurations: <code>with_skill</code> (agent has access to the evaluated skill), <code>without_skill</code> (baseline — agent runs without the skill), or <code>old_skill</code> (previous version for regression comparison). The benchmark compares configurations to measure the skill's impact.</div>

    <div class="glossary-term">Delta</div>
    <div class="glossary-def">The difference in a metric between the primary and baseline configurations. A positive pass-rate delta means the skill improved outcomes. Example: <code>+0.15</code> means 15 percentage points higher pass rate with the skill. Token and time deltas should be evaluated against quality gains — higher cost is acceptable if quality improves meaningfully.</div>

    <div class="glossary-term">Evidence</div>
    <div class="glossary-def">Concrete proof cited for each assertion result. For deterministic checks, evidence includes the file path, matched value, or parse status. For subjective assertions, the LLM grader must quote or reference output content. Every pass or fail must include evidence — no naked judgments.</div>

    <div class="glossary-term">Eval Case</div>
    <div class="glossary-def">A single evaluation scenario defined in <code>evals.json</code>. Contains a prompt (the task given to the agent), an expected output description, optional input files, tags for categorization, and a list of assertions to check the output against. Each eval case tests a specific skill behavior: creation, validation, fix, improvement, etc.</div>

    <div class="glossary-term">Benchmark</div>
    <div class="glossary-def">An aggregated report across all eval cases and configurations. Produced by <code>aggregate_benchmark.py</code>, it includes per-configuration pass-rate statistics (mean, stddev, CI), time and token usage, deltas between configurations, and per-run detail. The benchmark answers: "Did the skill improve outcomes, and is it worth the cost?"</div>

    <div class="glossary-term">Grader Bias</div>
    <div class="glossary-def">Systematic errors in LLM-based grading. Three common types: <strong>position bias</strong> (preferring first or last item in a list), <strong>verbosity bias</strong> (equating longer output with better quality), and <strong>self-enhancement bias</strong> (preferring output that matches the grader's own style). Mitigated via explicit bias-awareness instructions in <code>agents/grader.md</code> and by minimizing LLM grader use through deterministic checks.</div>
  `;
}

function switchTab(tabBtn) {
  document.querySelectorAll('[role="tab"]').forEach(b => {
    b.setAttribute('aria-selected', 'false');
  });
  document.querySelectorAll('[role="tabpanel"]').forEach(p => {
    p.setAttribute('aria-hidden', 'true');
  });
  tabBtn.setAttribute('aria-selected', 'true');
  const panel = document.getElementById(tabBtn.getAttribute('aria-controls'));
  if (panel) panel.setAttribute('aria-hidden', 'false');
}

document.addEventListener('DOMContentLoaded', () => {
  const tablist = document.querySelector('[role="tablist"]');
  const tabs = Array.from(document.querySelectorAll('[role="tab"]'));

  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      switchTab(btn);
    });
  });

  tablist.addEventListener('keydown', (e) => {
    const idx = tabs.indexOf(document.activeElement);
    if (idx === -1) return;
    let nextIdx;
    if (e.key === 'ArrowRight') {
      nextIdx = (idx + 1) % tabs.length;
    } else if (e.key === 'ArrowLeft') {
      nextIdx = (idx - 1 + tabs.length) % tabs.length;
    } else {
      return;
    }
    e.preventDefault();
    switchTab(tabs[nextIdx]);
    tabs[nextIdx].focus();
  });

  document.getElementById('prev-btn').addEventListener('click', () => {
    if (state.currentIndex > 0) renderRun(state.currentIndex - 1);
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    if (state.currentIndex < runs.length - 1) renderRun(state.currentIndex + 1);
  });

  if (runs.length) renderRun(0);
  renderBenchmark();
  renderGlossary();
});
</script>
</body>
</html>
